        color: #333;
      }

      button {

        padding: 10px 15px;
        font-size: 16px;
        border: none;
        border-radius: 5px;

      }

      .show {

      .next {

      let currentList = [];

      function shuffle(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      }

      function startSession() {
        const section = document.getElementById("section").value;
        currentList = shuffle([...data[section]]);
        index = 0;
        nextQuestion();
      }

      function nextQuestion() {
        if (index >= currentList.length) {
          document.getElementById("question").innerText = "Section completed 🎉";
          document.getElementById("answer").innerText = "Change section or restart";
          document.getElementById("answer").style.display = "block";
          return;
        }

        document.getElementById("question").innerText = currentList[index].q;
        document.getElementById("answer").innerText = currentList[index].a;
        document.getElementById("answer").style.display = "none";
        index++;
      }

        document.getElementById("answer").style.display = "block";
      }
